        // 渲染工作室列表
        function renderStudios(studios) {
            const grid = document.getElementById('studiosGrid');
            grid.innerHTML = studios.map(studio => `
                <div class="studio-card" onclick="viewDetail(${studio.id})">
                    ${studioPhotos[studio.id] ? '<img src="' + studioPhotos[studio.id] + '" alt="' + studio.name + '" class="studio-img">' : ''}
                    <h3>${studio.name}</h3>
                    <p class="leader">负责人：${studio.leader}</p>
                    <p class="address">${studio.address}</p>
                </div>
            `).join('');
        }

        // 初始化渲染
        renderStudios(studiosData);

        // 搜索功能
        function searchStudios() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = studiosData.filter(studio =>
                studio.name.toLowerCase().includes(keyword) ||
                studio.leader.toLowerCase().includes(keyword)
            );
            renderStudios(filtered);
        }

        // 筛选功能
        document.getElementById('filterTags').addEventListener('click', function(e) {
            if (e.target.classList.contains('filter-tag')) {
                document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
                e.target.classList.add('active');

                const filter = e.target.dataset.filter;
                if (filter === 'all') {
                    renderStudios(studiosData);
                } else {
                    const filtered = studiosData.filter(studio =>
                        studio.name.includes(filter) || studio.address.includes(filter)
                    );
                    renderStudios(filtered);
                }
            }
        });

        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchStudios();
            }
        });

        // 跳转详情页
        function viewDetail(id) {
            window.location.href = 'studio-detail.html?id=' + id;
        }
